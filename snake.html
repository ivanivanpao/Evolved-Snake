<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>貪食蛇</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        overflow: hidden;
      }
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          radial-gradient(2px 2px at 20px 30px, #eee, rgba(0, 0, 0, 0)),
          radial-gradient(2px 2px at 40px 70px, #fff, rgba(0, 0, 0, 0)),
          radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0, 0, 0, 0)),
          radial-gradient(2px 2px at 90px 40px, #fff, rgba(0, 0, 0, 0)),
          radial-gradient(2px 2px at 130px 80px, #fff, rgba(0, 0, 0, 0)),
          radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0, 0, 0, 0));
        background-size: 200px 200px;
        animation: twinkle 4s ease-in-out infinite;
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.8;
        }
        50% {
          opacity: 0.3;
        }
      }
      .container {
        position: relative;
      }
      #score {
        position: absolute;
        top: -50px;
        right: 0;
        color: #00ffff;
        font-size: 28px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 3px;
        text-shadow:
          0 0 10px #00ffff,
          0 0 20px #00ffff,
          0 0 40px #0088ff;
        z-index: 10;
        background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.1), transparent);
        padding: 10px 20px;
        border: 1px solid rgba(0, 255, 255, 0.3);
        border-radius: 4px;
      }
      #game-board {
        display: grid;
        grid-template-columns: repeat(20, 30px);
        grid-template-rows: repeat(20, 30px);
        border: 2px solid #1a3a5a;
        background:
          linear-gradient(rgba(10, 15, 30, 0.95), rgba(5, 10, 20, 0.95)),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 29px,
            rgba(30, 60, 100, 0.1) 30px
          ),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 29px,
            rgba(30, 60, 100, 0.1) 30px
          );
        border-radius: 8px;
        box-shadow:
          0 0 50px rgba(0, 150, 255, 0.15),
          inset 0 0 100px rgba(0, 0, 0, 0.8),
          0 0 1px 3px rgba(0, 200, 255, 0.3);
      }
      .cell {
        width: 30px;
        height: 30px;
      }
      .food {
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }
      .food::before {
        content: '';
        position: absolute;
        width: 40px;
        height: 40px;
        background: radial-gradient(circle, rgba(255, 200, 50, 0.6) 0%, transparent 70%);
        animation: sunPulse 2s ease-in-out infinite;
      }
      .food::after {
        content: '';
        width: 20px;
        height: 20px;
        background: radial-gradient(circle at 30% 30%, #fff7e0, #ffaa00, #ff6600);
        border-radius: 50%;
        box-shadow:
          0 0 15px #ff8800,
          0 0 30px #ff6600,
          0 0 50px rgba(255, 100, 0, 0.5);
      }
      @keyframes sunPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.3);
          opacity: 1;
        }
      }
      .snake {
        background: linear-gradient(180deg, #c084fc 0%, #9333ea 40%, #7c3aed 60%, #4c1d95 100%);
        border-radius: 4px;
        box-shadow:
          0 0 12px rgba(147, 51, 234, 0.8),
          0 0 25px rgba(192, 132, 252, 0.4),
          inset 0 2px 4px rgba(255, 255, 255, 0.3),
          inset 0 -2px 4px rgba(76, 29, 149, 0.5);
        position: relative;
      }
      .snake::before {
        content: '';
        position: absolute;
        top: 5px;
        left: 2px;
        right: 2px;
        height: 3px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
        border-radius: 2px;
      }
      .snake-head {
        background:
          radial-gradient(ellipse at 30% 30%, #e9d5ff, #a855f7 50%, #7c3aed),
          linear-gradient(180deg, #c084fc, #9333ea);
        border-radius: 6px;
        position: relative;
        box-shadow:
          0 0 20px rgba(168, 85, 247, 0.9),
          0 0 40px rgba(147, 51, 234, 0.5),
          inset 0 2px 6px rgba(255, 255, 255, 0.4),
          inset 0 -2px 6px rgba(76, 29, 149, 0.6);
      }
      .snake-head::before,
      .snake-head::after {
        content: '';
        position: absolute;
        width: 6px;
        height: 8px;
        background: linear-gradient(180deg, #fff, #1a1a2e);
        border-radius: 50%;
        top: 7px;
        box-shadow:
          0 0 10px rgba(232, 121, 249, 1),
          0 0 20px rgba(168, 85, 247, 0.8);
      }
      .snake-head::before {
        left: 6px;
      }
      .snake-head::after {
        right: 6px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="score">分數: 0</div>
      <div id="game-board"></div>
    </div>

    <script>
      const GRID_SIZE = 20
      const board = document.getElementById('game-board')
      const scoreDisplay = document.getElementById('score')

      const snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 },
      ]
      const food = { x: 15, y: 5 }
      let score = 0

      function createBoard() {
        board.innerHTML = ''
        for (let y = 0; y < GRID_SIZE; y++) {
          for (let x = 0; x < GRID_SIZE; x++) {
            const cell = document.createElement('div')
            cell.className = 'cell'
            cell.dataset.x = x
            cell.dataset.y = y

            if (x === food.x && y === food.y) {
              cell.classList.add('food')
            }

            const snakeIndex = snake.findIndex((s) => s.x === x && s.y === y)
            if (snakeIndex !== -1) {
              cell.classList.add('snake')
              if (snakeIndex === 0) {
                cell.classList.add('snake-head')
              }
            }

            board.appendChild(cell)
          }
        }
      }

      createBoard()
    </script>
  </body>
</html>
